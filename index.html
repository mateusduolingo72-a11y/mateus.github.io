<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lion Notifier</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    border-bottom: 1px solid #222;
}

.logo {
    color: gold;
    font-size: 24px;
}

.nav {
    display: flex;
    gap: 15px;
}

.nav button {
    background: #111;
    border: 1px solid #333;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

.container {
    padding: 40px;
}

.card {
    background: #151515;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.btn {
    background: #5865F2;
    padding: 12px 20px;
    border-radius: 8px;
    color: white;
    border: none;
    cursor: pointer;
}

input {
    padding: 10px;
    border-radius: 6px;
    border: none;
    margin-right: 10px;
}
</style>
</head>

<body>

<header>
<div class="logo">🦁 Lion Notifier</div>

<div class="nav">
<button>Dashboard</button>
<button>Purchase</button>
<button>Orders</button>
<button>Settings</button>
</div>

<div>
<button id="loginBtn" class="btn">Login</button>
<span id="user"></span>
</div>
</header>

<div class="container">

<div class="card">
<h2>Balance: $<span id="balance">0</span></h2>
</div>

<div class="card">
<h2>Purchase</h2>

<input id="amount" placeholder="Amount ($)">
<button id="payBtn" class="btn">Pay with Card</button>
</div>

<div class="card">
<h2>Orders</h2>
<ul id="orders"></ul>
</div>

</div>

<script>
// ================= DISCORD LOGIN =================
const clientId = "COLE_SEU_CLIENT_ID_AQUI";
const redirectUri = encodeURIComponent(window.location.href.split("?")[0]);

document.getElementById("loginBtn").onclick = () => {
  window.location.href =
  `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=token&scope=identify`;
};

const hash = window.location.hash;
if (hash) {
  const params = new URLSearchParams(hash.replace("#",""));
  const token = params.get("access_token");

  if (token) {
    fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: `Bearer ${token}` }
    })
    .then(res=>res.json())
    .then(user=>{
      localStorage.setItem("user", JSON.stringify(user));
      document.getElementById("user").innerText = user.username;
    });
  }
}

const savedUser = localStorage.getItem("user");
if(savedUser){
  document.getElementById("user").innerText = JSON.parse(savedUser).username;
}

// ================= BALANCE =================
let balance = Number(localStorage.getItem("balance")) || 0;
document.getElementById("balance").innerText = balance;

// ================= ORDERS =================
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function renderOrders(){
  const ul = document.getElementById("orders");
  ul.innerHTML = "";
  orders.forEach(o=>{
    const li = document.createElement("li");
    li.innerText = `$${o.amount} - ${o.date}`;
    ul.appendChild(li);
  });
}
renderOrders();

// ================= PAGAMENTO =================
document.getElementById("payBtn").onclick = async () => {
  const amount = document.getElementById("amount").value;

  if (!amount || amount < 5) {
    alert("Minimum $5");
    return;
  }

  const res = await fetch("https://mateus-github-io.onrender.com/create-checkout", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();
  localStorage.setItem("pendingPayment", amount);
  window.location.href = data.url;
};

// ================= RETORNO STRIPE =================
const urlParams = new URLSearchParams(window.location.search);

if(urlParams.get("success")){
  const amount = Number(localStorage.getItem("pendingPayment"));

  if(amount){
    balance += amount;
    localStorage.setItem("balance", balance);

    orders.push({
      amount: amount,
      date: new Date().toLocaleString()
    });

    localStorage.setItem("orders", JSON.stringify(orders));
    localStorage.removeItem("pendingPayment");

    alert("Payment successful!");
    window.location.href = window.location.pathname;
  }
}
</script>

</body>
</html>
