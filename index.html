<!DOCTYPE html>
<html>
<head>
<title>Lion Notifier</title>
<style>
body { background:#0b0b0b; color:white; font-family:Arial; text-align:center; }
.btn { background:#5865F2; padding:15px 25px; border-radius:8px; color:white; cursor:pointer; margin:10px; }
</style>
</head>
<body>

<h1>🦁 Lion Notifier</h1>

<button id="loginBtn" class="btn">Login with Discord</button>

<h2 id="user"></h2>

<h2>Balance: $<span id="balance">0</span></h2>

<input id="amount" placeholder="Amount ($)" />
<button id="payBtn" class="btn">Pay with Card</button>

<h2>Orders</h2>
<ul id="orders"></ul>

<script>
// ================= LOGIN DISCORD =================
const clientId = "SEU_CLIENT_ID_AQUI";
const redirectUri = encodeURIComponent(window.location.href.split("?")[0]);
const scope = "identify";

document.getElementById("loginBtn").onclick = () => {
  window.location.href =
  `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=token&scope=${scope}`;
};

const hash = window.location.hash;
if (hash) {
  const params = new URLSearchParams(hash.replace("#",""));
  const token = params.get("access_token");

  if (token) {
    fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: `Bearer ${token}` }
    })
    .then(res=>res.json())
    .then(user=>{
      localStorage.setItem("user", JSON.stringify(user));
      document.getElementById("user").innerText = user.username;
    });
  }
}

const savedUser = localStorage.getItem("user");
if(savedUser){
  document.getElementById("user").innerText = JSON.parse(savedUser).username;
}

// ================= BALANCE =================
let balance = Number(localStorage.getItem("balance")) || 0;
document.getElementById("balance").innerText = balance;

// ================= ORDERS =================
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function renderOrders(){
  const ul = document.getElementById("orders");
  ul.innerHTML = "";
  orders.forEach(o=>{
    const li = document.createElement("li");
    li.innerText = `$${o.amount} - ${o.date}`;
    ul.appendChild(li);
  });
}
renderOrders();

// ================= PAGAMENTO =================
document.getElementById("payBtn").onclick = async () => {
  const amount = document.getElementById("amount").value;

  const res = await fetch("https://mateus-github-io.onrender.com/create-checkout", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();
  localStorage.setItem("pendingPayment", amount);
  window.location.href = data.url;
};

// ================= RETORNO STRIPE =================
const urlParams = new URLSearchParams(window.location.search);

if(urlParams.get("success")){
  const amount = Number(localStorage.getItem("pendingPayment"));

  if(amount){
    balance += amount;
    localStorage.setItem("balance", balance);

    orders.push({
      amount: amount,
      date: new Date().toLocaleString()
    });

    localStorage.setItem("orders", JSON.stringify(orders));
    localStorage.removeItem("pendingPayment");

    alert("Pagamento confirmado!");
    window.location.href = window.location.pathname;
  }
}
</script>

</body>
</html>
